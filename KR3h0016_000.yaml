body:
  text: 益州名畫録藝術類一書畫之屬提要臣等謹案益州名畫錄三卷宋黄休復撰前有景徳三年李畋序稱江夏黄氏休復字歸本通春秋學校左氏公榖書鬻丹養親游心顧陸之藝深得厥趣然休復别有茅亭客話陳振孫書錄解題亦不詳其里貫但以所言多蜀事又嘗著成都名畫記疑為蜀人則此書一名成都名畫記而舊本與茅亭客話皆未題里貫故振孫云然今本皆題江夏人疑後人以畋序補書也所記凡五十八人起唐乾元迄宋乾徳品以四等曰逸曰神曰妙曰能逸格一人神格二人妙格上品七人中品十人下品十一人而寫真二十二處無姓名者附焉能格上品十五人中品五人下品七人而有畫無名有名無畫者附焉其大慈寺六祖院羅漢閣畫休復評妙格中品而列能品之末不與寫真二十二處一例非妙字誤刋則編次時偶疎也畋序又稱益都自唐二帝播越諸侯作鎮畫藝之傑者多游從而来故是編所集皆取其事跡之係乎蜀者而不盡為蜀産考鄧椿畫繼稱蜀雖僻逺而畫手獨多于四方李方叔載徳隅齋畫而蜀筆居半云云則休復之詳錄益州非夸飾矣其書敘述頗古雅而詩文典故所載尤詳非他家畫品泛題髙下無所指據者比也書錄解題又稱中興書目以為李畋撰休復書今亡此書有景徳三年序不著姓名而著休復所錄明甚又有休復自為序則固未嘗亡也云云據其所説則别本但題李畋之名不以序文為出李畋今本作畋序又與宋時本不合然諸刻本皆作畋序别無攷證故姑從舊本仍存畋名焉乾隆四十四年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀益州名畫録原序大凡觀畫而神會者鮮矣不過視其形似其或洞達氣韻超出端倪用筆精緻不謂之工傅采炳縟不謂之麗觀乎象而忘象意先自然始可品繪工於彀中揖畫聖於方外有造物者思唯是得之江夏黃氏休復字歸本通春秋學校左氏公穀書暨摭百家之説鬻丹養親行達於世恬如也加以㳺心顧陸之藝深得厥趣居常以魏晉之竒蹤隋唐之懿迹盈縑溢帙類而珍之適值博雅之士欵扉求見則敞茅屋拂榻塵架而陳之娛賔賞心萬慮一泯及其僧舍道居靡不往而玩之環嵗忘倦盖益都多名畫富視他郡謂唐二帝播越及諸侯作鎮之秋是時畫藝之傑者㳺從而來故其標格楷模無處不有聖朝伐蜀之日若升堂邑彼廨宇寺觀前輩名畫纎悉無圯者迨淳化甲午嵗盜發二川焚刼略盡則墻壁之繪甚乎剥廬家秘之寶散如決水今可覿者十二三焉噫好事者為之幾鬱矣黄氏心鬱久之又能筆之書存録之也故自李唐乾元初至皇宋乾徳嵗其間圖畫之尤精取其目所擊者五十八人品以四格離為三卷命曰益州名畫録書來謂余有陶隠居之好恨無畫之癖首貺讀之序以見託且曰畫之神妙功格往躅前範黄氏録之詳矣至如蜀都名畫之存亡繫後學之明昧斯黄氏之志也故其書婉而當博而有倫體而不亂信夫學者得意忘象觀前賢之逸軌然後考黄氏之四格則思過半矣非獨鳴圖畫之譽於坤維者哉時景徳三年五月二十日虞曹外郎致仕李畋序益州名畫録原序欽定四庫全書益州名畫録目録畫之逸格最難其儔拙規矩於方圓鄙精研於彩繪筆簡形具得之自然莫可楷模出於意表故目之曰逸格爾逸格一人孫位大凡畫藝應物象形其天機迥髙思與神合創意立體妙合化權非謂開厨已走拔壁而飛故目之曰神格爾神格二人趙公佑范瓊畫之於人各有本性筆精墨妙不知所然若投刃於解牛類運斤於斫鼻自心付手曲盡𤣥微故目之曰妙格爾妙格上品七人陳皓彭堅張騰趙溫竒趙徳齊盧楞伽張素卿妙格中品十人辛澄李洪度左全張南本髙道興房從真趙徳𤣥常粲常重𦙍黄筌妙格下品十一人李昇張𤣥杜齯龜刁光𦙍蒲師訓趙忠義黄居寶黄居寀李文才阮知誨張玟畫有性周動植學侔天功乃至結嶽融川潛鱗翔羽形象生闕功者故目之曰能格爾能格上品十五人吕嶤竹䖍周行通孔嵩石恪杜措杜𢎞義杜子瓌杜敬安蒲延昌趙才程承辯丘文播阮惟徳楊元真能格中品五人陳若愚張景思麻居禮僧楚安滕昌祐能格下品七人姜道隠禪月大師張詢宋藝李夀儀僧令宗丘文曉
