body:
  text: 益州名畫録卷中宋黄休復撰妙格下品十一人李昇李昇者成都人也小字錦奴年纔弱冠志攻山水天縱生知不從師學初得張藻員外唐時名士善畫山水山水一軸玩之數日云未盡妙也遂出意寫蜀境山川平逺心思造化意出先賢數年之中創成一家之能俱盡山水之妙每含豪就素必有新竒桃園洞圖武陵溪圖青城山圖峨眉山圖二十四化山圖好事得之為箱篋珍後學得之以為亡言師明皇朝有李將軍擅名山水蜀人皆呼昇為小李將軍蓋其藝相匹爾悟達國師自京入蜀重其髙手請於聖夀寺本院同居數年因於殿壁畫三峽圖一堵霧中山圖一堵既而又請於大聖慈寺真堂内畫漢州三學山圖一堵彭州至徳山一堵時稱悟達國師真堂四絶常粲寫真僧道盈書額李商隠讚李昇畫山水今見存張𤣥張𤣥者簡州金水石城山人也攻畫人物尤善羅漢當王氏偏霸武成年聲跡喧然時呼𤣥為張羅漢荆湖淮浙令人入蜀縱價收市將歸本道前輩畫佛像羅漢相傳曹様吳様二本曹起曹弗興吴起吳棟曹畫衣紋稠疊吳畫衣紋簡略其曹畫今昭覺寺孫位戰勝天王是也其吳畫今大聖慈寺盧楞伽行道髙僧是也𤣥畫羅漢吳様矣今大聖慈寺灌頂院羅漢一堂十六軀見存杜齯龜杜齯龜者其先本秦人避禄山之亂遂居蜀焉齯龜少能博學涉獵經史專師常粲寫真雜畫而妙於佛像羅漢王蜀少主以髙祖受唐深恩將興元節度使唐道襲私第為上清宫塑王子晉為逺祖於上清祖殿命齯龜寫大唐二十一帝御容於殿堂之四壁毎三會五獵差太尉公卿薦獻宫内殿堂行事齋宫職掌並依太清宫故事又命齯龜寫先主太妃太后真於青城山金華宫授翰林待詔賜紫金魚袋今嚴君平觀杜天師光庭真大聖慈寺華嚴閣東廊下祐聖國師光業真並齯龜筆見存刁光𦙍刁光𦙍者雍京人也天復年入蜀攻畫湖石花竹猫兎鳥雀性情髙潔交逰不雜入蜀之後前輩有攻花雀者頓減價矣有師問筆法者黄筌孔嵩二人親授其訣孔類升堂黄得入室刁公居蜀三十餘年筆無蹔暇非病不休非老不息卒時八十以來豪貴之家及好事者收得其畫將為家寶傳示子孫大聖慈寺熾盛光院明僧録房窗傍小壁四堵畫四時雀竹廣政中黄居寀重粧雀蝶精竒轉甚三學院大㕔小壁花雀兩堵光𦙍畫時年已耄矣蒲師訓蒲師訓者蜀人也幼師房從真畫人物鬼神蕃馬長興年值孟令公改元興修諸廟師訓畫江瀆廟諸葛廟龍女廟及先主殂畫陵廟鬼神蕃漢人物旗幟兵仗公王車馬禮服儀式縱横浩瀚莫不周至授翰林待詔賜紫金魚袋甲寅歲春末蜀主衣夢一人破㡌故襕龎眉大目方頤廣顙立于殿堦跂一足曰請修理之言訖寢覺翌日因檢他籍見一古畫是前夕所夢者神故絹穿損畫之左足遂命師訓令驗此畫是誰之筆師訓對云唐吳道𤣥之筆曾應明皇夢云痁者神也因令重修此足呈進後蜀主復夢前神謝曰吾足履矣上慮為祟即命焚之青城山丈人觀真君殿内五嶽四瀆部屬諸神張素卿筆廣政中山水泛溢衝損數堵蜀主命師訓曰素卿之筆公往繼之可矣四堵師訓筆也今丈人觀聖朝廣其殿宇重新興創别畫無舊蹤矣王蜀先主祠堂東畔正門東畔鬼神一堵寶厯寺天王閣下天王部屬房從真筆後人粧損師訓再修兼自畫兩堵大聖慈寺南廊下觀音院門兩金剛鄰壁請塔天王並師訓筆見存趙忠義趙忠義者徳𤣥子也徳𤣥自雍襁負入蜀及長習父之藝宛若生知孟氏明徳年與父同手畵福慶禪院東流傳變相一十三堵位置鋪舒樓殿臺閣山水竹樹蕃漢服飾佛像僧道車馬鬼神王公冠冕旌旗法物皆盡其妙冠絶當時蜀主知忠義妙於鬼神屋木遂令畫闗將軍起玉泉寺圖於是忠義畫自運材斸基以至丹楹刻桷疊栱下㭿皆役鬼神地架一坐佛殿將欲起立蜀主令内作都料看此畫圖枋栱有準的否都料對曰此畫復較一座分明無欠其妙如此授翰林待詔賜紫金魚袋先是毎年杪冬末旬翰林攻畫鬼神者例進鍾馗焉丙辰嵗忠義進鍾馗以第二指挑鬼眼睛蒲師訓進鍾馗以拇指剜鬼睛二人鍾馗相似唯一指不同蜀主問此畫孰為優劣筌以師訓為優蜀主曰師訓力在拇指忠義力在第二指二人筆力相敵難議昇降並厚賜金帛時人謂蜀主深鑒其畫矣今衙北門大安樓下天王院自濮陽吳公行曾鎮蜀之日創興其中有唐時名畫數堵及髙道興杜齯龜房從真趙徳齊畫佛像羅漢經驗變相廣政初忠義與黄筌蒲師訓合手畫天王變相十堵以來各盡所能愈於前輩淳化五年甲午兵火焚盡今餘王蜀先主祠堂正門西畔神鬼大聖慈寺正門北墻上西域記石經院後殿天王變相中寺六祖院傍藥師經變相並忠義筆見存黄居寶黄居寶字辭玉筌之次子也畫性最髙風姿俊爽前輩畫太湖石皆以淺深黑淡嵌空而已居寶以筆端摤攃上七賞反下七葛反文理縱横夾雜砂石稜角峭硬如虬虎將踴厥狀非一也其有畫松竹花雀變態舊規皆如湖石之類授翰林待詔賜紫金魚袋不幸早亡秀而不實者也黄居寀居寀字伯鸞筌少子也畫藝敏贍不讓於父蜀之四主崇奢宫殿苑囿池亭世罕其比居寀父子入内供奉迨四十年殿庭墻壁門幃屏幛圖畫之數不可紀録授翰林待詔將仕郎試太子議郎賜金魚袋淮南通好之日居寀與父同手畫四時花雀圖青城山圖峨眉山圖春山圖秋山圖用荅國信使命將發秋山全未及畫蜀主令取在庫秋山圖入角居寀與父奉命别畫經月方畢工更愈於前者翰林學士徐光溥進秋山圖歌以紀之廣政甲子嵗蜀主令居寀往葛仙山修盖仙化回至彭州棲真南軒畫水石一堵自未至酉而畢敏而復妙者也今見存居寀有四時野景圖湖灘水石圖春田放牧圖當時卿相及好事者得居寀子父圖障卷簇家藏户寶為希世之珍今衙㕔餘理毛啄苔鶴兩堵水石兩堵龍門圖一堵武侯廟龍水一堵並居寀筆見存聖朝克蜀之後居寀赴京頗為翰長陶尚書穀殊禮相見因收得名畫數件請居寀驗之其中秋山一圖是故主荅淮南國信者畫絹縫之内自有銜名陶公云此是淮王所遺看之果符其説聖朝授翰林待詔朝請大夫寺丞上柱國賜紫金魚袋淳化四年充成都府一路送衣襖使時齒六十一於聖興寺新禪院畫龍水一堵天台山圖一堵水石兩堵工夫雖少大體宛存偽學士徐光溥秋山圖歌天與黄筌藝竒絶筆精迥感重瞳恱運思潛通造化工揮豪定得神仙訣秋來奉詔寫秋山寫在輕綃數幅間髙低向背無遺勢重巒疊嶂何孱顔目想心存妙尤極研巧覈能狀不得珍禽異獸皆自馴竒花怪木非因植﨑嶇石磴絶㳺蹤薄霧㝠㝠藏半峰娑羅掩映迷仙洞薜荔纍垂繳古松月檻參差錦鱗闕星壇斑駁翠苔封傍岸牛羸行嚼草過橋僧老坐搘筇屈原江上嬋娟竹陶潛籬下芳菲鞠良宵祗恐鷓鴣啼晴波但見鴛鴦浴暮烟羃羃鏁村塢一葉扁舟横野渡䬃䬃白蘋欲起風黯黯紅蕉猶帶雨曲沼芙蓉香馥郁長汀蘆荻花􅀢蔌雁過孤峯帖逺青鹿傍小溪飲殘緑秋山秀兮秋江静江光山色相輝映雪迸飛泉濺釣磯雲分落葉擁樵逕張藻松石徒稱竒邊鸞花鳥何足窺白旻鷹逞凌風勢薛稷鶴誇警露姿方原畫山空巉巖峭壁枯槎人見嫌孫位畫水多洶湧警湍怒濤人見恐若教對此定妍媸必定伏膺懷愧悚再三展向冕旒側便是移山回磵力大李小李滅聲華獻之愷之無顔色髣髴垂綸渭水濵吾皇覩之思良臣依稀荷鍤傅巖野吾皇覩之求賢者從兹仄展復懸旌宵衣旰食安天下才當老人星應候願與南山俱獻夀微臣稽首貢長歌丹青景化同天和李文才李文才者華陽人也攻畫人物屋木山水善寫真罕及周昉之亞也蜀廣政中荆南髙太王令邸務丁晏入蜀請文才寫興義門兩雙石笋兼徴其故實將歸本道文才告道士范徳昭皆云真珠樓基或云是海眼未審孰是徳昭曰吾聞諸至人斯乃蠶叢啓國鎮蜀之碑中以鐵柱貫之下以横石相連埋于地際上有文字言嵗時豐儉兵革水火之事諸葛曾掘驗之真珠樓基海眼皆非也蜀人少知云出圓方記未詳廣政末主置真堂大聖慈寺華嚴閣後命文才寫諸親王文武臣僚等真授翰林待詔將仕郎試太子司議郎賜緋魚袋畫未畢聖朝弔伐盡已除毁三學院經樓下西天三藏真定惠國師真華嚴閣迎廊下奉聖國師真應天寺無智禪師真並文才筆見存阮知誨阮知誨者成都人也攻畫女郎筆蹤妍麗及善寫真王氏乾徳年寫少主真於大聖慈寺三學院經樓下孟氏明徳年寫先主真於三學院真堂内寫福慶公主真玉清公主真於内庭知誨兩朝多寫皇姑帝戚渥澤累遷授翰林待詔銀青光禄大夫檢校尚書左僕射兼御史大夫上柱國張玟張玟成都人也父授蜀翰林寫貌待詔賜緋玟有超父之藝尤精寫貌及畫婦人鉛華姿態綽有餘妍議者比之張萱之儔也孟先主明徳年於大聖慈寺三學院置真堂玟曾與故東川董太尉璋冩真先主惡之不為寫巳乃命阮知誨獨寫巳真文武臣僚玟之筆也今並塗抹無畫蹤矣授翰林待詔賜紫金魚袋玟有自漢至唐治蜀君臣像三卷能格上品十五人吕嶤竹䖍附吕嶤者京兆人也唐翰林待詔自京随僖宗皇帝車駕至蜀授將仕郎守漢州雒縣主簿賜緋魚袋今大聖慈寺華嚴閣上天王部屬諸神及王波利真並嶤之筆見存竹䖍者雍京人也攻畫人物佛像聞成都創起大聖慈寺欲將吳道𤣥地獄變相於寺畫焉廣明年隨駕到蜀左全已在多寶塔下畫竟遂與華嚴閣下後壁西畔畫丈六天花瑞像一堵周行通周行通者蜀人也攻畫人物鬼神蕃馬戎服器械氊帳鷹犬羊雁之類及川原放牧盡得其妍有李陵送蘇武圖奪馬圖三困圖射鵰圖陰山七騎圖蜀人皆傳周胡蕃馬為妙行通多髯故也孔嵩孔嵩者一名景蜀人也幼攻花雀長遇刁處士入蜀師其筆法至晚年巾裹衣服言論動止俱斆刁公在蜀公侯門四十餘載圖畫甚多人皆寶之黄筌於石牛廟畫龍一堵黄居寀於諸葛廟畫龍一堵嵩於廣福院畫龍一堵蜿蜒怪狀不與常同逼視逺觀勢欲躩躍時人異之此三公畫龍宗師孫位孫宗顧愷之曹弗興行龍之筆謝赫古畫録云弗興之筆代不復傳秘閣之内一龍而已魏赤烏元年冬十月此赤烏是吳大帝年號非魏武帝武帝㳺青溪見一赤龍自天而下凌波而行遂命弗興圖之武帝讚曰赤烏孟冬不時見龍青溪深澗奮鬛來空有道則吉無徳則凶匪兼雲雨靡帶雷風弗興畫畢未讚竒工我因披閱藴隆忡忡至宋文帝時累月亢旱祈禱無應乃取弗興畫龍置於水上應時畜水成霧經旬霶霈其所畫流落人間至今相傳石恪石恪字子專成都人也幼無羈束長有聲名雖博綜儒學志唯好畫攻古體人物斆張南本筆法有田家社會圖鼈靈開峽圖夏禹治水圖新羅人較力圖陳子昂盧藏用宋之問髙適畢構李白孟浩然王維賀知章司馬承禎仙宗十友圖嚴君平㧞宅升僊圖五星圖南北斗圖夀星圖儒佛道三教圖道門三官五帝圖雖豪貴相請少有不足圖畫之中必有譏諷焉城中寺觀壁畫亦多兵火後餘聖夀寺經閣院𤣥女堂六十甲子神龍興觀仙逰閣下龍虎君並見存杜措杜措者蜀人也幼慕李昇山水長亦勤學廿年中晝夕不捨今大聖慈寺六祖院傍地藏菩薩竹石山水一堵并院内羅漢閣上小壁翠微寺禪和尚真三學院經堂上小壁太子捨身餵餓虎一堵善惠仙人布髪掩泥一堵並措之筆見存杜𢎞義杜𢎞義者蜀州晉原人也攻畫佛像羅漢今寶厯寺東廊下一堵文殊西廊下一堵普賢及行道髙僧十餘堵見存蜀人相傳杜老朱羅漢為妙老朱𢎞義小字杜子瓌杜子瓌者成都人也擅於傅采拂澹偏長唯攻佛像王蜀時於龍華泉東禪院畫毗盧佛據紅日輪乗碧蓮花座每誇同輩云某粧此圓光如日初出淺深瑩然無筆玷之迹見存杜敬安敬安子瓌子也美繼父蹤妙於佛像今大聖慈寺普賢閣下北方天王三學院羅漢閣下無量夀尊並敬安筆蜀城寺院敬安父子圖畫佛像羅漢甚衆蜀偏霸時江吳商賈入蜀多請其畫將歸本道孟氏明徳年授翰林待詔賜金魚袋蒲延昌蒲延昌者師訓養子也筆力遒健甚得師法廣政中進畫授翰林待詔賜緋魚袋時福感寺禮塔院僧模寫宋展子䖍師子于壁延昌一見曰但得其様未得其筆爾遂畫師子一圖獻通進王昭逺公有嬖妾患痁是夕懸於卧内其疾頓減王公召而問其神異延昌云宋展氏子䖍於金陵延祚寺佛殿之内畫此二師子患人因坐壁下或有愈者梁昭明太子偶患風恙御醫無減吳興太守張僧繇模此二師子密懸寢堂之内應夕而愈故名曰辟邪有此神驗久矣展氏古本師子一則奔走奮迅一則回擲咆哮僧繇後亦繼之二師子翻身側視鬃尾俱就八分牙爪似二龍拏珠之狀其本至今相傳延昌於諸葛廟壁畫亦多兵火後餘聖夀寺青衣神廟神鬼人物數堵見存趙才趙才者蜀人也攻畫人物鬼神甲馬廣政年才與蒲師訓子父較敵其藝浣花甘亭侯廟頗當神廟鬼神人物旗幟甲馬及資福寺門南北二方天王甲午嵗兵火倒損已盡今存諸葛廟第三門兩畔鬼神兩堵見存程承辯程承辯者眉州彭山人也攻畫人物鬼神當孟氏廣政中與蒲師訓蒲延昌趙才遞相較敵其藝皆推妙手兼善雕刻機巧人物鬼神怪異禽獸之類竒絶當時今彭山縣洞明觀天蓬黑煞𤣥武火鈴一堂存耳山王堂逰變神鬼一堵見存丘文播丘文播者漢州人也後改名潛攻畫山水人物佛像神僊今新都乾明禪院六祖漢州崇教禪院羅漢紫極宫二十四化神仙皆文播筆見存其有花雀文播男餘慶畫阮惟徳惟徳者知誨子也襲承父藝美繼前蹤子父同時入内供奉畫貴公子夜宴圖宫中賞春圖宫中戲鞦韆圖宫中七夕乞巧圖宫中熨鐵圖宫中按舞圖宫中按樂圖皆畫當時宫苑亭臺花木皇妃帝后富貴之事精妙頗甚授翰林待詔將仕郎試太常寺齋郎賜緋魚袋蜀廣政初荆湖商賈入蜀競請惟徳畫川様美人卷簇將歸本道以為竒物楊元真楊元真者石城山張𤣥外族也攻畫佛像羅漢兼善粧鑾當王氏武成中善塑像者簡州許候東川雍中本二人時推妙手今聖興寺天王院天王及部屬熾盛光佛九曜二十八宿天長觀龍興觀龍虎宫并雍中本塑大聖慈寺熾盛光佛九曜二十八宿華嚴閣下西畔立釋迦像并許候塑皆元真粧肉色髭髪衣紋錦繡及諸禽類備著竒巧時輩罕及今四天王寺壁畫五臺山文殊菩薩變相一堵元真筆見存真二十二處蜀自炎漢至于巨唐將相理蜀皆有遺愛民懷其徳多寫真容年代既逺頹損皆盡唯唐杜相國及聖朝吕侍郎二十二處見存六處有寫貌人名一十六處亡失寫貌人姓氏皆評妙格杜相國鴻漸慈寺真在大崔相國寧真在龍興寺韋太師臯髙太尉崇文寺真在大慈武相國元衡夀寺真在聖段相國文昌任真在資福寺兩䕶軍從事真在大慈寺普賢閣下李太尉徳裕寺真在大慈楊侍中嗣復夀寺真在聖李相國固言軍真在龍興寺護從事真全崔相國鄲軍真在大慈寺護從事真全杜相國琮從真在淨衆寺兩任護軍事真全皆陳詵筆白令公敏中感寺真在福魏相國謩軍真在中興寺護從事真全夏侯相國孜寺真在聖夀吳太尉行魯王寺真在四天髙相國駢全護軍從事真牛尚書叢全護軍從事真蕭相國鄴全護軍從事真陳太師敬瑄常待詔筆韋相國昭度真常待詔筆已上在大慈寺王司徒建常真在龍興觀待詔筆吕侍郎餘慶繼真在聖夀寺王之模寫益州名畫錄卷中
