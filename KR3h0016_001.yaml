body:
  text: 益州名畫録卷上宋黃休復撰逸格一人孫位孫位者東越人也僖宗皇帝車駕在蜀自京入蜀號會稽山人性情疏野襟抱超然雖好飲酒未曾沉酩禪僧道士常與往還豪貴相請禮有少慢縱贈千金難留一筆唯好事者時得其畫焉光啓年應天寺無智禪師請畫山石兩堵龍水兩堵寺門東畔畫東方天王及部從兩堵昭覺寺夢休長老請畫浮漚先生松石墨竹一堵倣潤州髙座寺張僧繇戰勝一堵兩寺天王部衆人鬼相雜矛㦸鼓吹縱橫馳突交加戛擊欲有聲響鷹犬之類皆三五筆而成弓絃斧柄之屬並掇筆而描如從繩而正矣其有龍拏水洶千狀萬態勢愈飛動松石墨竹筆精墨妙雄壯氣象莫可記述非天縱其能情高格逸其孰能與於此邪悟達國師請於眉州福海院畫行道天王松石龍水兩堵並見存不知其後有何所遇改名遇矣景朴者蜀人也蜀廣政年輒於應天寺門西畔畫西方天王及部從兩堵以對孫遇筆識者比之蹄涔巨浸未萬分之一焉慮誤後人因附而正之神格二人趙公祐公祐者長安人也寶厯中寓居蜀城攻畫人物尤善佛像天王神鬼初贊皇公李德裕鎮蜀之日賔禮待之自寶厯太和至開成年公祐於諸寺畫佛像甚多㑹昌年一例除毁唯存大聖慈寺文殊閣下天王三堵閣裏內東方天王一堵藥師院師堂內四天王并十二神前寺石經院天王部屬並公祐筆見存公祐天資神用筆奪化權應變無涯罔象莫測名髙當代時無等倫數仞之墻用筆最尚風神骨氣唯公祐得之六法全矣范瓊范瓊者不知何許人也開成年與陳皓彭堅同時同藝寓居蜀城三人善畫人物佛像天王羅漢鬼神三人同手於諸寺圖畫佛像甚多會昌年除毀後餘大聖慈一寺佛像得存洎宣宗皇帝再興佛寺三人於聖夀寺聖興寺淨衆寺中興寺自大中至乾符筆無暫釋圖畫二百餘間墻壁天王佛像髙僧經驗及諸變相名目雖同形狀一無同者自淳化五年咸平三年兩遇兵火得存三寺筆蹤大聖慈南廊下藥義大將和修吉龍王鬼子母天女五堵謂之十七護神北廊下石經院門兩金剛東西二方天王中寺大悲院門上阿彌陀佛及四菩薩院門兩畔觀音像藥師像石經板上七佛四仙人大悲變相大將堂兩畔南北二方天王文殊閣下北方天王及天王變相此寺畫壁自唐至今年紀深逺彩色故暗重粧損者十四五矣聖夀寺大殿釋伽像行道北方天王像西方變相殿上小壁水月觀音浴室院旁西方天王大悲院八明王西方變相并大中年畫此寺壁畫年紀亦逺倒損者十四五矣聖興寺大殿東北二方天王藥師十二神釋迦十弟子彌勒像大悲變相並咸通畫其中西方一堵甚著竒工精妙之極也焉芻瑟磨像兩堵設色未半筆蹤儼然後之妙手終莫能繼自聖夀聖興兩寺佛僧范瓊親描並見存妙格上品六人陳皓彭堅附陳皓彭堅者不知何許人也開成中與范瓊寓止蜀城大中年府主杜相公悰起淨衆等寺門屋相國知三人中范瓊年齒雖低手筆稱冠矣因請陳彭二公各畫天王一堵各令一客將伴之以幔幕遮蔽不令相見欲驗誰之强弱至畫告畢之日相國與諸府寮徹其幃幕南畔仗劍振威者彭公筆北畔持弓奮赫者陳公筆二公筆力相似觀者莫能升降大約宗師吳道𤣥之筆而傅采拂淡過之畫之六法一曰氣運生動是也二曰骨法用筆是也三曰應物象形是也四曰隨類賦采是也五曰經營位置是也六曰傳移模寫是也斯之六法名輩少該唯此三人俱盡其美矣張騰張騰者不知何許人也太和末年寓止蜀川於諸寺壁圖畫亦多會昌年除毁皆盡大中初佛寺再興於聖夀寺大殿畫文殊一堵普賢一堵彌勒下生一堵浴室院北對范瓊畫持弓北方天王一堵大聖慈寺文殊閣下畫報身如來一堵並騰之筆見存趙溫竒趙溫竒者公祐子也幼而穎秀長有父風父殁之後於大聖慈寺文殊閣內繼父之蹤畫北方天王及梵王帝釋大輪部屬大將堂大將部屬并梵王帝釋普賢閣下南方天王華嚴閣上畫東西二方天王梵王帝釋中興寺大殿文殊普賢及天王部衆並溫竒筆見存趙德齊德齊者溫竒子也乾寧初王蜀先主府城精舍不嚴禪室未廣遂於大聖慈寺大殿東廡起三學延祥之院請德齊於正門西畔畫南北二方天王兩堵院門舊有盧楞伽畫行道髙僧三堵六身賴德齊遷移至今獲在光化年王蜀先主受昭宗勑置生祠命德齊與髙道興同手畫西平王儀仗旗纛旌麾車輅法物及朝真殿上皇姑帝戚后妃嬪御百堵已來授翰林待詔賜紫金魚袋蜀光天元年戊寅嵗蜀先主殂逝再命德齊與道興畫陵廟鬼神人馬及車輅儀仗宫寢嬪御一百餘堵大聖慈寺竹溪院釋迦十弟子并十六大羅漢崇福禪院帝釋及羅漢崇真禪院帝釋梵王及羅漢堂內文殊普賢皆德齊筆見存議者以德齊三代居蜀一時名振克紹祖業榮耀何多盧楞伽楞伽者京兆人也明皇帝駐蹕之日自汴入蜀嘉名髙譽播諸蜀川當代名流咸伏其妙至德二載起大聖慈寺乾元初於殿東西廊下畫行道髙僧數堵顔真卿題時稱二絶至乾寧元年王蜀先主於寺東廊起三學院不敢損其名畫移一堵於院門南移一堵於門北一堵於觀音堂後此行道僧三堵六身畫經二百五十餘年至今宛如初矣西廊下一堵馬鳴提婆像二軀雖遭粉飾猶未損其筆蹤餘者重粧皆昧前迹蜀中諸寺佛像甚多會昌年皆盡毁張素卿道士張素卿者簡州人也少孤貧性好畫在川主譙國夏侯公孜宅多見隋唐名畫藝成之後落拓無羈束遂衣道士服唯畫道門尊像豪貴之家少得其畫者乾符中居青城山常道觀焚修至中和元年僖宗皇帝遣使與賜紫道士杜光庭封丈人山為希夷公癸卯嵗素卿上表云五嶽既已封王丈人位居五嶽之上不可稱公是嵗敕宜改封五嶽丈人為希夷真君素卿賜紫素卿有老子過流沙圖五嶽朝真圖九皇圖五星圖老人星圖二十四化真人像太無先生像素卿於諸圖畫而能敏速落錐之後下筆如神自始及終更無改正今龍興觀甚有畫壁年深皆盡頽損餘張百子堂板龕內門兩畔龍虎兩軀素卿筆見存王蜀先主修青城山丈人觀請素卿於丈人真君殿上畫五嶽四瀆十二溪女山林溪沼樹木諸神及嶽瀆曹吏詭怪之質生於筆端上殿觀者無不恐懼又於簡州開元觀畫容成子董仲舒嚴君平李阿馬自然葛𤣥長夀仙黃初平葛永璝竇子明左慈蘇耽十二仙君像各寫當初賣卜賣藥書符導引時真筆蹤灑落彩畫因循當代名流皆推畫手蜀檢校太傅安公思謙好古博雅唐時名畫人皆獻之黃筌滕昌祐石恪皆在其門館賔禮優厚甲寅嵗十一月十一日值蜀主誕生之辰安公進素卿所畫十二仙真形十二幀蜀主耽玩歎賞者久因命翰林學士禮部侍郎歐陽炯次第讚之令翰林待詔黃居寶八分書題之凡有醮奏於玉局開懸供養乾德三年聖朝克復吏部侍郎吕公餘慶守蜀日求古畫圖書並將進呈斯畫預焉妙格中品十人辛澄辛澄者不知何許人也建中元年大聖慈寺南畔創立僧伽和尚堂請澄畫焉才欲援筆有一蕃人云僕有泗州真本一見甚竒遂依樣描寫及諸變相未畢蜀城士女瞻仰儀容者側足將燈香供養者如驅今已重粧損矣普賢閣下五如來同坐一蓮花及鄰壁小佛九身閣裏內如意輪菩薩並澄之筆見存李洪度洪度者蜀人也元和中府主相國武公元衡請於大聖慈寺東廊下維摩詰堂內畫帝釋梵王兩堵笙竽鼓吹天人姿態筆蹤妍麗時之妙手莫能偕焉會昌前諸寺圖畫亦多除毁後餘此一處左全左全者蜀人也世傳圖畫跡本名家寶厯年中聲馳闕下於大聖慈寺中殿畫維摩變相師子國王菩薩變相三學院門上三乘漸次修行變相降魔變相文殊閣東畔水月觀音千手眼大悲變相極樂院門兩金剛西廊下金剛經驗及金光明經變相前寺南廊下行道二十八祖北廊下行道羅漢六十餘軀多寶塔下倣長安景公寺吳道𤣥地獄變相當時吳生畫此地獄相都人咸觀懼罪修善兩市屠沽經月不售王蜀時令雜手重粧已損惟存大體也大中初又於聖夀寺大殿畫維摩詰變相一堵樓閣樹石花雀人物冠冕蕃漢異服皆得其妙今見存張南本張南本者不知何許人也中和年寓止蜀城攻畫佛像人物龍王神鬼有金谷園圖勘書圖詩會圖白居易叩齒圖髙麗王行香圖今聖夀寺中門賔頭盧變相東廊下靈山佛會大聖慈寺華嚴閣下東畔大悲變相竹溪院六祖興善院大悲菩薩八明王孔雀王變相並南本筆相傳南本於金華寺大殿畫明王八軀才畢有一老僧入寺蹶仆于門下初不知是畫但見大殿遭火所焚其時孫位畫水南本畫火代無及者世之水火皆無定質唯此二公之畫冠絶古今僖宗駕回之後府主陳太師於寶厯寺置水陸院請南本畫天神地祇三官五帝雷公電母嶽瀆神仙自古帝王蜀中諸廟一百二十餘幀千怪萬異神鬼龍獸魍魎魑魅錯雜其間時稱大手筆也至孟蜀時被人模搨竊換真本鬻與荆湖人去今所存僞本耳僞本淳化年遭賊搓劫已皆散失髙道興髙道興者成都人也攻雜畫觸類皆長尤善佛像髙僧光化年高宗敕許王蜀先主置生祠命道興與趙德齊同手畫西平王儀仗車輅旌旗禮服法物朝真殿上皇姑帝戚后妃女樂百堵已來授翰林待詔賜紫金魚袋及先主殂逝再命道興與德齊畫陵廟鬼神人馬兵甲公王儀仗宫寢嬪御一百餘堵今大慈寺中兩廊下髙僧六十餘軀華嚴閣東畔丈六天花瑞像並見存房從真房從真者成都人也攻畫甲馬人物鬼神冠絶當時有寧王獵射圖羌人移居圖陳登斫鱠圖冷朝陽王昌齡常建冒雪入京圖蒲師訓師其筆法王蜀先主於浣花龍興寺修聖夫人堂合水津起通波侯廟請從真畫甲馬旍旗從官鬼神授翰林待詔賜紫金魚袋今寶厯寺五丈天王閣下天王部屬諸神並從真筆後人重粧已損蒲師訓因再修之趙德𤣥趙德𤣥者雍京人也天福年入蜀攻畫車馬人物屋木山水佛像鬼神筆無偏擅觸類皆長獨步川中標名大手其有樓殿臺閣向背低昂代無比者有朱陳村圖豐稔圖漢祖歸豐沛圖盤車圖臺閣樣入蜀時將梁隋唐名畫百本至今相傳裴孝源公私畫録云自魏晉以來終于貞觀祕府并人間畫共集成二百九十八卷二百三十卷是隋唐官本十三卷是左僕射蕭瑀進二十卷楊素家得三卷許善心進十卷髙平縣書佐女張氏所獻四卷安福進十八卷先在祕府無得處人名唯有天和年月集賢校理張懷瓘云昔武帝博雅好古鳩集名畫令鑒者數人共詳名氏兼定品格供御賞玩及侯景作亂江陵府將陷元帝先焚內庫書畫數萬卷深可歎息其後帝王亦有兼愛人多進之又盈祕府天后朝張易之奏召天下名工修諸圖畫因竊換真本私家收藏將僞本進納易之殁後薛稷所得稷殁之後岐王所獲岐王慮帝忽知乃盡焚爇吁天下重寶再經灰燼當時天府所藏多涉於僞人間所畜或乃是真古畫頻經焚燒積年散失能祕在者得非希世之寶耶蜀因二帝駐蹕昭宗遷幸自京入蜀者將到圖書名畫散落人間固亦多矣杜天師在蜀集道經三千卷儒書八千卷德𤣥將到梁隋及唐百本畫或自模搨或是粉本或是墨跡無非祕府散逸者本相傳在蜀信後學之幸也今福慶禪院隱形羅漢變相兩堵德𤣥筆見存常粲常粲者雍京人也咸通年路侍中巖牧蜀之日自京入蜀路公賔禮待之粲善傳神雜畫有七賢像六逸像女媧伏羲神農像謂之三皇圖立釋迦像五天胡僧像孔子西周問禮像名醫下蠱像摴蒱圖龍樹驗丹圖先賢卷軸至今好事者收得為後學師範矣玉局化壁畫道門尊像甚多王蜀時修改後頽損已換今大聖慈寺悟達國師知𤣥真粲之筆見存常重𦙍重𦙍者粲之子也僖宗皇帝幸蜀回鑾之日蜀民奏請留寫御容於大聖慈寺其時隨駕寫貌待詔盡皆操筆不體天顔府主陳太師敬瑄遂表進重𦙍御容一寫而成內外官屬無不歎駭謂為僧繇之後身矣宣令中和院上壁及寫隨駕文武臣寮真殿上御容前寫西川節度副大制置指揮諸道兵馬兼供軍使太師中書令成都尹潁川郡王陳敬瑄義成軍節度使中書令王鐸門下侍中韋昭度檢校司徒守太子太保鄭畋檢校司徒鄭延休翰林學士承㫖守兵部尚書樂朋龜翰林學士守禮部尚書杜讓能翰林學士戶部侍郎崔凝翰林學士中書舍人沈仁偉翰林學士中書舍人侯䎖尚書左僕射裴璩禮部尚書兼太常禮儀使牛叢左散騎常侍楊堪右散騎常侍柳涉右散騎鄭瑣左諌議大夫李紹鰌右諫議大夫蕭說尚書左丞知中朝御史中丞盧澤給事中李輝給事中宋旦中書舍人鄭欣比部郎中知制誥蘇循尚書右丞判戶部張禕尚書吏部侍郎張讀尚書刑部侍郎充集賢殿學士李燠尚書禮部侍郎知貢舉歸仁澤行在十軍司馬工部侍郎判度支秦韜玉御容後寫左神策軍觀軍容使護軍中尉田令孜右神策護軍中尉觀軍容使西門思恭內飛龍使知內侍省楊復恭內樞密使田匡禮內樞密使李順融宣徽南院使劉景宣宣徽北院使田獻銖左衛大將軍石守悰左金吾大將軍劉巨容行在諸軍馬步都虞候趙及諸司使副一百餘員尋授駕前翰林待詔賜緋魚袋自駕歸京韋相國昭慶授西川節制陳太師與監護田軍容令孜拒命據城王蜀先主時為行軍司馬重圍三年陳太師田軍容以城降既克下王先主拜僖宗御容于時繪壁百寮咸在唯不見陳太師田軍容真因問二公何無寫貌寺僧對云拒扞王師近方塗抹先主曰某豈與丹青為參商遽命重寫常待詔曰不必援豪乃挼皂莢水洗之而風姿宛然先主嘉賞賜以金帛常公自言我畫爛梁摧之外雨淋水洗終無剝落者矣衆歎所謂前無去者後無繼者僞通王宗裕性多猜忌或於媵嬖意欲寫貌惡人久見謂常待詔曰頗不孰視審觀可乎常公但諾之王曰夫人至矣立斯須而退翌日想貌姿容短長無遺豪髮其敏妙皆此類也玉局化寫王蜀先主為使相日真容後移在龍興觀天寶院夀昌殿上大聖慈寺興善院泗州和尚真華亭張居士真寶厯寺請塔天王寧蜀寺都官土地並重𦙍筆見存黃筌黃筌者成都人也幼有畫性長負竒能刁處士入蜀授而教之竹石花雀又學孫位畫龍水松石墨竹學李升畫山水竹樹皆曲盡其妙筌早與孔嵩同師嵩但守師法别無新意筌既兼宗孫李學力因是博贍損益刁格遂超師之藝後唐莊宗同光年孟令公知祥到府厚禮見重建元之後授翰林待詔權院事賜紫金魚袋至少主廣政甲辰嵗淮南通聘信幣中有生鶴數隻蜀主命筌寫鶴於偏殿之壁警露者啄苔者理毛者整羽者唳天者翹足者精彩態度更愈于生往往致生鶴立于畫側蜀主歎賞遂目為六鶴殿焉尋加至內供奉朝議大夫檢校少府少監上柱國先是蜀人未曾得見生鶴皆傳薛少保畫鶴為竒筌寫此鶴之後貴族豪家竟將厚禮請畫鶴圖少保自此聲漸減矣廣政癸丑嵗新構八卦殿又命筌於四壁畫四時花竹兔雉鳥雀其年冬五坊使於此殿前呈雄武軍所進白鷹誤認殿上畫雉為生掣臂數四蜀王歎異久之遂命翰林學士歐陽炯撰壁畫竒異記以旌之筌有春山圖秋山圖山家晚景圖山家早景圖山家雨景圖山家雪景圖山居詩意圖瀟湘圖八夀圖今石牛廟畫龍水一堵見存蜀八卦殿壁畫竒異記僞蜀翰林學士歐陽炯撰述夫龍圖鳳紀初宣上古之文帝室皇居必藴非常之寶是以書美鍾張之翰畫稱顧陸之蹤代有其人朝無乏事今上睿文英武聖明孝皇帝御極之一十九載九功惟叙七政斯齊化溢升平俗登仁夀天惟行健動則總覽萬幾道法自然靜則無遺一物將欲權衡三代拱揖百王宸襟所適諒超化表嘗於大殿西門創一小殿藻井之上輪排八卦故以為號焉其御座几桉圖書之外非有異於常者固不關於聖慮其年秋七月上命內供奉檢校少府少監黃筌謂曰爾小筆精妙可圖畫四時花木蟲鳥錦雞鷺鷥牡丹躑躅之類周于四壁庶將觀矚焉筌自秋及冬其工告畢間者淮南獻鶴數隻尋令貌于殿之間上曰女畫逼矣其精彩則又過之筌以下臣末技降階曲謝而已至十二月三日上御斯殿有五坊節級羅師進呈雄武軍先進者白鷹其鷹見壁上所畫野雉連連掣臂不住再三誤認為生類焉上嗟嘆良久曰昔聞其事今見其人遽令所進呈者引退無至搦損兹壁因目筌為當代竒筆仍令宣付翰林學士歐陽炯紀述竒異微臣拜手因得叙其事焉伊昔大舜垂衣作繪乃彰於象物宗周鑄鼎觀形可禦於神姦漢號雲臺唐稱煙閣圖畫之要史策攸傳公私雖見於數家今古皆言於六法六法之內惟形似氣運二者為先有氣運而無形似則質勝於文有形似而無氣運則華而不實筌之所作可謂兼之不然者安得粉壁之中奮霜毛而欲起綵豪之下混朱頂以相親而又觀彼白鷹盼乎錦雉儼丹青而可測狀若偎叢掣絛鏇以難停勢將掠地遂契重瞳之鑒假以好生俄回三面之仁真疑害物舉斯二類兼彼羣花四時之景堪觀千載之名可尚稽諸往牒少有通神圖海獸以騰波秦朝賈譽畫池龍而致雨唐室垂名至於誤㸃成蠅徒成小巧不成似犬安可勝言況兹殿也迥架昭回髙臨爽塏瑶池水滿浮鏡裏之樓臺玉樹風輕鎖壺中之日月聖上以勤詠墳典親講政刑崇制禮作樂之名極侍問安親之孝允文允武無怠無荒故士有一技一藝皆升陟褒賞如筌者焉激東海之波濤難方聖澤拱北辰之光耀永固皇基誠非末士之常談可紀至尊之所御臣職叨翰苑譽乏儒林因廣聖謨聊同畫品恭承宣命實愧菲辭峕廣政十六嵗嵗次癸丑十二月記益州名畫録卷上
