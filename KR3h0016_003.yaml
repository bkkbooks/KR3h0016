body:
  text: 益州名畫録卷下宋黃休復撰能格中品五人陳若愚道士陳若愚者左蜀人也師張素卿畫遂衣道士服師事素卿受其筆法王氏永平廢興聖觀為軍營其觀有五金鑄天尊形明皇御容一軀移在大聖慈寺御容院供養餘道門尊像殿堂皆就龍興觀起立今精思院北帝殿是也殿上壁畫有青龍君白虎君朱雀君玄武君四像並若愚筆見存張景思張景思者金水石城山張玄之裔也思之一族世傳圖畫佛像羅漢景思王氏永平年於聖夀寺北廊下畫降魔變相一堵見存麻居禮麻居禮者蜀人也幼師張南本筆法親得其訣光化天復年聲迹已喧資簡卭蜀州寺觀壁畫甚多今聖夀寺偏門北畔畫八難觀音一堵見存僧楚安僧楚安蜀州什邡人也俗姓句氏攻畫人物樓臺有明皇幸華清宫避暑圖吳王宴姑蘇臺圖此二圖皆畫於墻壁圖簇團扇之上其墻壁圖簇團扇大小雖殊功夫並無減者竒巧如此當時公侯相重皆稱妙手今大聖慈寺三學院大廳後明皇帝幸華清宫避暑圖一堵楚安筆見存僧惠堅者蜀人也亦好圖畫而最謬焉廣政中三學院僧請畫姑蘇臺一堵對句楚安避暑宫圖識者以為無鑒之甚也今亦見存恐後人誤認故附而正之滕昌祐滕昌祐字勝華先本吳人隨僖宗入蜀以文學從事唯昌祐不婚不仕書畫是好情性髙潔不肯趨時常於所居樹竹石把菊種名花異草木以資其畫殁時年齒八十有五初攻畫無師唯寫生物以似為功而已有蟲魚圖蟬蝶圖生菜圖折枝花圖折枝果子圖雜竹樣造夾紵果子隨類傅色並擬諸生攻書時呼滕書今大聖慈寺文殊閣普賢閣蕭相院方丈院多利心院藥師院天花瑞像數額並昌祐筆也其畫蟬蝶草蟲謂之點畫蓋唐時陸果劉褒之類也其畫折枝花下筆輕利用色鮮妍蓋唐時邊鸞之類也能格下品七人薑道隱薑道隱者蜀州綿竹人也年才齠齔盡日不歸父母尋之多於神佛廟中畫處才見及長為人木訥不務農桑唯畫是好不畜妻孥孑然一身常戴一竹笠布衣草履筆墨而已雖父母兄弟亦罕測其行止人皆呼為木猱頭蜀語謂其鬢髮蓬鬆偽相趙國公吳知其性迹請畫屏風相公問何姓名蜀語對云薑姓無名相國曰既無名何不以道隱名之自此始名馬宋王趙公庭隱於淨衆寺創一禪院請道隱於長老方丈畫山水松石數堵宋王與諸侍從觀其運筆道隱未嘗回顧旁若無人畫畢王贈之十縑置僧堂前拂衣而去他皆放此今綿竹縣山觀寺多有畫壁見存禪月大師禪月大師婺州金溪人也俗姓薑氏名貫休字德隱天復年入蜀王先主賜紫衣師號師之詩名髙節宇內咸知善草書圖畫時人比諸懷素師閻立本畫羅漢十六幀龎眉大目者朵頤隆鼻者倚松石者坐山水者蕃貌梵相曲盡其態或問之云休自夢中所覩爾又畫釋迦十弟子亦如此類人皆異之頗為門弟子所寶當時卿相皆有歌詩求其筆唯可見而不可得也太平興國年初太宗皇帝搜訪古畫日給事中程公羽牧蜀將貫休羅漢十六幀為古畫進呈偽翰林學士歐陽炯禪月大師應夢羅漢歌西嶽髙僧名貫休髙情峭拔凌清秋天教水墨畫羅漢魁岸古容生筆頭時捎大絹泥髙壁閉目焚香坐禪室或然夢裏見真儀脫下袈裟點神筆髙握節腕當空擲窣窣豪端任狂逸逡巡便是兩三軀不似畫工虛費日怪石安排嵌復枯真僧列坐連跏趺形如瘦鶴精神健骨似犬犀頭骨粗缺倚松根傍巖縫曲碌腰身長欲動看經弟子擬聞聲瞌睡山童疑有夢不知夏臘幾多年一手搘頤偏袒肩口開或若共人語身定復疑初坐禪案前卧象低垂鼻崖畔老猿斜展臂芭蕉花裏刷輕紅苔蘚文中暈深翠硬缺笻杖矮松牀雪色眉毛一寸長繩關梵夾兩三片線補衲衣千萬行林間落葉紛紛墮一印殘香斷煙火皮穿木屐不曾拖笋織蒲團鎮長坐休公休公逸藝無人加聲譽喧喧遍海涯五七字詩一千首大小篆字三十家唐朝厯厯多名士蕭子雲兼吳道子若將書畫比休公只恐當時浪生死休公休公始自江南來入秦于今到蜀無交親詩名畫手皆竒絶覷你凡人爭是人瓦棺寺裏維摩詰舍衛城中辟支佛若將此畫比量看總在人間為第一張詢張詢者南海人也爰自鄉薦下第久住帝京精於小筆中和年隨駕到蜀與昭覺寺夢休長老故交遂依托焉忽一日長老請於本寺大慈堂後留少筆蹤畫一堵早景一堵午景一堵晚景謂之三時山蓋貌吳中山水頗甚工畫畢之日遇僖宗駕幸兹寺盡日歎賞王氏朝皇太子簡王欲要遷於東宫為壁泥通枋移損不全乃寢前命今見存宋藝宋藝蜀人也攻寫真王蜀時充翰林寫貌待詔模寫大唐二十一帝聖容及當時供奉道士葉法善禪僧一行沙門海會內侍髙力士於大聖慈寺玄宗御容院上壁今見存李夀儀道士李夀儀者卭州依政人也壯年慕道於本縣有德觀為道士齋醮之外專精畫業人呼為李水墨多畫道門尊像往來青城山丈人觀宗師張素卿筆法每點簇五嶽四瀆部屬歸家習學之如此數年簡州開元觀有張素卿畫十二仙君一堂乾德四年遭火所焚廣政中夀儀往彼焚香齋潔模寫將歸卭州天師觀西院上壁其畫但窮精粹筆力因於素卿神彩氣運有過時流一堂六堵見存僧令宗僧令宗丘文播異姓弟也攻畫山水人物佛像天王今大聖慈寺三學院下經樓院下兩畔四天王兩堵放生池揭諦堂內六祖並令宗筆見存丘文曉丘文曉文播弟也攻畫山雀人物佛像今淨衆寺延夀禪院天王祖師及諸髙僧竹石花雀二十餘堵廣政癸卯嵗文曉與僧令宗合手描畫今見存有畫無名大聖慈寺六祖院羅漢閣上峨眉山青城山羅浮山霧中四堵中和年畫不留姓名評妙格中品三學院舊名東厨院門兩畔畫東北二方天王兩堵王蜀先主修改後移在院內北廊下亡失姓名評能格上品多寶塔下南北二方天王彌勒佛會師子國王菩薩普賢閣外北方天王不記畫人名姓評能格中品聖夀寺東廊下維摩詰堂內畫居士方丈花竹芭蕉山水松石風候雲氣三堵景福年畫不留姓名評能格中品昭覺寺大悲堂內四天王兩堵堂外觀音一堵寺門後兩畔東西天王兩堵並中和年畫不知畫人名姓評能格中品無畫有名益州學館記云獻帝興平元年陳留髙朕為益州太守更葺成都玉堂石室東别創一石室自為周公禮殿其壁上圖畫上古盤古李老等神及厯代帝王之像梁上又畫仲尼七十二弟子三皇以來名臣耆舊云西晉太康中益州刺史張收筆古有益州學堂圖今已别重粧無舊迹矣劉瑱齊永明十年成都刺史劉悛再修玉堂禮殿靈宇嚴肅悛弟瑱性自天真時推妙手畫仲尼四科十哲像并車服禮器今已重粧别畫無舊蹤矣薛少保者名稷天后朝位至太子少保文章學術名冠當時而好圖畫畫品録云祕書省有薛少保畫鶴時稱一絶又聞蜀郡多有公畫盧求成都記云府衙院西廳少保畫鶴與青牛并少保自眉州司馬遷移文記今改舊制無畫蹤矣王宰者大厯年家于蜀川善畫山水樹石意出像外故杜甫歌云十日畫一水五日畫一石能事不受相促迫王宰始肯留真迹壯哉崑崙方壺圖挂君髙堂之素壁巴陵洞庭日本東赤岸水與銀河通中有雲氣隨飛龍舟人漁子入浦溆山木盡亞洪濤風尤攻逺勢古莫比咫尺應須論萬里焉得并州快剪刀剪取吳松半江水今蜀中寺觀亦無畫蹤唯好事者收得畫品録定為妙格韋偃者京兆人也寓止蜀川善畫馬韓幹之亞也故杜甫歌云韋侯别我有所適知我憐君畫無敵戲拈秃筆掃驊騮欻見騏驎出東壁一匹齕草一匹嘶坐看千里當霜蹄時危安得真致此與人同生亦同死蜀中寺觀亦無筆蹤唯好古者收得畫品録定為妙品浣花龍興寺成都記云本正覺寺內有前益州長史臨淮武公元衡并從事五人具朝服繪于中堂淳化五年兵火後無畫蹤矣成都記云府衙西北前益州五長史真李太尉德裕文記今無畫蹤唯文字相傳爾重寫前益州五長史真記益州草堂寺成都記云寺在府西七里去浣花亭三里列畫前長史一十四人節度使職不帶尹則帶長史非今賔佐也代稱絶迹余嘗於數公子孫之家獲見圖狀乃知草堂繢事靡不造真昔巖野旁求徒聞審像稽山髙遁唯上鎔金孰若托之丹青妙畫神照然楚國祠廟魯王宫室暨此邦文翁舊館皆圖厯代卿相粲然可觀雖有慕於前良曾莫究於形似豈與夫年代既逺遺像猶存入虛室而煙霞暫披拂浮埃而瑶林斯覩余以精廬甚古畫壁將傾乃選其功德尤著者五人模於郡之廳所追惟二漢臺閣皆有圖寫黃霸于定國雖宰相名臣不得在畫像之列卓子康德行君子而居功臣之右今之所取其在兹乎采色既新光靈可想儼若神對吾將與歸因敘其事以貽來哲太和四年閏十二月十八日劒南西川節度副大使知節度事銀青光祿大夫檢校兵部尚書兼成都尹御史大夫贊皇縣開國伯李德裕記胡氏亭畫記蓋聞藝逰而至者則神傳焉神傳者國寶矣墨妙之於藝蓋又加貴焉浮圖焰熾於今國力不能逮也故藝之至者雖鴻德巨儒亦伍於工徒矣唐故宰相薛公稷畫入神品以名之重時加貴之成都靜德精舍有壁二堵雜繪鳥獸人物態狀生動乃一時之尤者也吾后帝宇之五年汙叛帖夷萬方無事於是大去蠱人之疾以浮圖氏為最詔走御史監毁域內之祠凡雲構山峙之宇一時而壞百工之名迹隨去焉胡氏璩文而好古惜少保之迹不存於鄉乃操斤挾黨力剟於頽坌之際得人三十七頭馬八足又於福勝祠獲展氏子虔天樂二十五身及鄉之名工李氏感天樂十二色皆神傳異迹陷于茅亭之壁長者之車益滿門矣任愚子若缺時寓蜀壯君好事之心亡於壓覆於是染醉豪紀其始於石會昌五年五月三日檢校尚書司空員外郎賜緋魚袋郭圖記今畫無舊迹唯有石記在三學山廨院東北此院是胡璩宅益州名畫録卷下
